# Production overrides for on-premise RPi deployment.
#
# Applies on top of docker-compose.yml:
#   docker compose -p qc_level1 \
#     -f docker-compose.yml \
#     -f deploy/docker-compose.prod.yml \
#     up -d --build
#
# Container names are prefixed with the project name (qc_level1_) so they
# do not clash with any other stack already running on the same host.
# TLS is handled by the shared pmp-edge ingress (qcl1.pmp.com:443).

services:
  api:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
